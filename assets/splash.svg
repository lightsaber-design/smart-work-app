<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <!-- Light background (Splash_A) -->
  <rect width="2732" height="2732" fill="#f5f7fa"/>

  <!-- Ghost clock watermark -->
  <circle cx="1366" cy="1366" r="900" fill="none" stroke="#181D26" stroke-width="8" opacity="0.03"/>

  <!-- Round clock mark (matches the real app/OS icon — favicon.svg / adaptive icon foreground),
       not the older pin-shaped mark. scale=3.4, centered at (1366,1374). -->
  <g transform="translate(1026, 1034) scale(3.4)">
    <circle cx="100" cy="100" r="92" fill="#E6E9EF"/>
    <circle cx="100" cy="100" r="46" fill="#181D26"/>
    <circle cx="100" cy="100" r="41" fill="none" stroke="#E6E9EF" stroke-width="1.2" opacity="0.3"/>
    <text x="100" y="68" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#E6E9EF" text-anchor="middle">XII</text>
    <text x="137" y="105" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#E6E9EF" text-anchor="middle">III</text>
    <text x="100" y="140" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#E6E9EF" text-anchor="middle">VI</text>
    <text x="63" y="105" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#E6E9EF" text-anchor="middle">IX</text>
    <line x1="100" y1="100" x2="83" y2="89" stroke="#E6E9EF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="117" y2="89" stroke="#E6E9EF" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="3.5" fill="#34B1AF"/>
  </g>

  <!-- Wordmark: "Ministry" (light) + "Log" (bold teal), centered -->
  <text x="1366" y="2020" font-family="Inter,Arial,sans-serif" font-size="160" text-anchor="middle" letter-spacing="-4">
    <tspan font-weight="400" fill="#181D26">Ministry</tspan><tspan font-weight="700" fill="#34B1AF">Log</tspan>
  </text>

  <!-- Underline -->
  <rect x="1016" y="2052" width="700" height="8" rx="4" fill="#34B1AF"/>

  <!-- Tagline -->
  <text x="1366" y="2180" font-family="monospace" font-size="56" fill="#788090" text-anchor="middle" letter-spacing="14">REGISTRO DE CAMPO</text>
</svg>
